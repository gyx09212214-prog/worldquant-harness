services:
  worldquant_harness:
    build: .
    ports:
      - "8003:8003"
    volumes:
      - worldquant-harness-data:/app/data
      - worldquant-harness-reports:/app/reports
      - ./worldquant_harness.db:/app/worldquant_harness.db
    env_file:
      - .env
    environment:
      - AUTH_DISABLED=true
      - DATABASE_URL=postgresql+asyncpg://worldquant_harness:password@host.docker.internal:5433/worldquant_harness
    restart: unless-stopped

volumes:
  worldquant-harness-data:
  worldquant-harness-reports:
