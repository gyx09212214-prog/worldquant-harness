name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check worldquant_harness/ tests/

      - name: Type check (advisory)
        continue-on-error: true
        run: pyright worldquant_harness/

      - name: Public harness demo smoke
        run: |
          python scripts/run_public_harness_demo.py --output-root reports/public_harness_demo_ci --run-id public-harness-demo-ci
          python scripts/validate_public_harness_artifacts.py reports/public_harness_demo_ci

      - name: Test with coverage
        env:
          JWT_SECRET_KEY: test-secret-for-ci-only
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
        run: pytest tests/ -x -q --cov=worldquant_harness --cov-report=term-missing --cov-fail-under=33

      - name: Dependency audit
        run: pip-audit --strict --desc -f json 2>/dev/null | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          vulns = data.get('dependencies', [])
          own_pkgs = {'worldquant-harness','worldquant_harness','pandas','numpy','scipy','baostock','quantstats',
                      'mcp','uvicorn','fastapi','openai','sqlalchemy','aiosqlite',
                      'alembic','pyjwt','bcrypt','aiosmtplib','httpx','akshare',
                      'apscheduler','starlette','python-multipart'}
          critical = [v for v in vulns if v.get('name','').lower() in own_pkgs and v.get('vulns')]
          if critical:
              for c in critical:
                  for vuln in c['vulns']:
                      print(f\"::warning ::{c['name']} {c['version']}: {vuln['id']} (fix: {vuln.get('fix_versions',['?'])})\")
              print(f'{len(critical)} direct-dependency vulnerabilities found')
          else:
              print('No direct-dependency vulnerabilities')
          "

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
