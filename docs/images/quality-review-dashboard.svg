<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
<title id="title">worldquant-harness quality review dashboard</title>
<desc id="desc">Static worldquant-harness public harness visual.</desc>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#5c6670"/>
  </marker>
  <style>
    text { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #17202a; letter-spacing: 0; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 15px; fill: #5c6670; }
    .label { font-size: 15px; font-weight: 700; }
    .body { font-size: 13px; fill: #5c6670; }
    .tiny { font-size: 12px; fill: #5c6670; }
    .metric { font-size: 20px; font-weight: 700; }
  </style>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="48" y="54" class="title">Period quality review dashboard</text><text x="48" y="82" class="subtitle">Submitted and generated alpha quality are reviewed together, with self-correlation pressure made explicit.</text><rect x="70" y="132" width="206" height="104" rx="8" fill="#f7f9fb" stroke="#d8dde3"/><text x="86" y="160" class="body">Period quality</text><text x="86" y="193" class="metric" fill="#2f6fed">0.628</text><text x="86" y="216" class="tiny">combined review score</text><rect x="325" y="132" width="206" height="104" rx="8" fill="#f7f9fb" stroke="#d8dde3"/><text x="341" y="160" class="body">Generated pass</text><text x="341" y="193" class="metric" fill="#c47f17">27%</text><text x="341" y="216" class="tiny">unsubmitted quality</text><rect x="580" y="132" width="206" height="104" rx="8" fill="#f7f9fb" stroke="#d8dde3"/><text x="596" y="160" class="body">Ready rate</text><text x="596" y="193" class="metric" fill="#1f9d55">9%</text><text x="596" y="216" class="tiny">candidate generation yield</text><rect x="835" y="132" width="206" height="104" rx="8" fill="#f7f9fb" stroke="#d8dde3"/><text x="851" y="160" class="body">Self-corr fail</text><text x="851" y="193" class="metric" fill="#d64545">18%</text><text x="851" y="216" class="tiny">main blocker pressure</text><text x="90" y="300" class="label">Quality buckets</text><text x="90" y="339" class="tiny">active</text><rect x="240" y="324" width="250" height="18" rx="5" fill="#eef1f4"/><rect x="240" y="324" width="31.2" height="18" rx="5" fill="#2f6fed"/><text x="502" y="339" text-anchor="end" class="tiny">100%</text><text x="90" y="367" class="tiny">blocked_self_correlation</text><rect x="240" y="352" width="250" height="18" rx="5" fill="#eef1f4"/><rect x="240" y="352" width="62.5" height="18" rx="5" fill="#2f6fed"/><text x="502" y="367" text-anchor="end" class="tiny">2</text><text x="90" y="395" class="tiny">generated_candidate</text><rect x="240" y="380" width="250" height="18" rx="5" fill="#eef1f4"/><rect x="240" y="380" width="250.0" height="18" rx="5" fill="#2f6fed"/><text x="502" y="395" text-anchor="end" class="tiny">8</text><text x="90" y="423" class="tiny">ready</text><rect x="240" y="408" width="250" height="18" rx="5" fill="#eef1f4"/><rect x="240" y="408" width="31.2" height="18" rx="5" fill="#2f6fed"/><text x="502" y="423" text-anchor="end" class="tiny">100%</text><text x="600" y="300" class="label">Self-correlation pressure</text><text x="600" y="339" class="tiny">liquidity_microstructure</text><rect x="750" y="324" width="250" height="18" rx="5" fill="#eef1f4"/><rect x="750" y="324" width="83.3" height="18" rx="5" fill="#2f6fed"/><text x="1012" y="339" text-anchor="end" class="tiny">33%</text><text x="600" y="367" class="tiny">volume|vwap</text><rect x="750" y="352" width="250" height="18" rx="5" fill="#eef1f4"/><rect x="750" y="352" width="83.3" height="18" rx="5" fill="#2f6fed"/><text x="1012" y="367" text-anchor="end" class="tiny">33%</text><text x="600" y="395" class="tiny">demo_liquidity_reversal</text><rect x="750" y="380" width="250" height="18" rx="5" fill="#eef1f4"/><rect x="750" y="380" width="83.3" height="18" rx="5" fill="#2f6fed"/><text x="1012" y="395" text-anchor="end" class="tiny">33%</text><text x="600" y="423" class="tiny">close|volume</text><rect x="750" y="408" width="250" height="18" rx="5" fill="#eef1f4"/><rect x="750" y="408" width="83.3" height="18" rx="5" fill="#2f6fed"/><text x="1012" y="423" text-anchor="end" class="tiny">33%</text><text x="600" y="451" class="tiny">demo_price_volume_corr</text><rect x="750" y="436" width="250" height="18" rx="5" fill="#eef1f4"/><rect x="750" y="436" width="83.3" height="18" rx="5" fill="#2f6fed"/><text x="1012" y="451" text-anchor="end" class="tiny">33%</text><text x="48" y="526" class="tiny">What this proves: the project can review a time window of alpha generation quality, not just one final submission.</text></svg>
