<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
<title id="title">worldquant-harness agent research harness overview</title>
<desc id="desc">Static worldquant-harness public harness visual.</desc>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#5c6670"/>
  </marker>
  <style>
    text { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #17202a; letter-spacing: 0; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 15px; fill: #5c6670; }
    .label { font-size: 15px; font-weight: 700; }
    .body { font-size: 13px; fill: #5c6670; }
    .tiny { font-size: 12px; fill: #5c6670; }
    .metric { font-size: 20px; font-weight: 700; }
  </style>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="48" y="54" class="title">worldquant-harness: agent research harness with memory feedback</text><text x="48" y="82" class="subtitle">Sandbox, presubmit, harness score, memory, and profile evolution are visible before any real submit path.</text><rect x="48" y="138" width="154" height="112" rx="8" fill="#eaf1ff" stroke="#2f6fed" stroke-width="2"/><text x="64" y="168" class="label">Human Goal</text><text x="64" y="194" class="body">Research target and</text><text x="64" y="212" class="body">constraints</text><line x1="206.0" y1="194.0" x2="222.0" y2="194.0" stroke="#5c6670" stroke-width="2.2" marker-end="url(#arrow)"/><rect x="226" y="138" width="154" height="112" rx="8" fill="#eaf1ff" stroke="#2f6fed" stroke-width="2"/><text x="242" y="168" class="label">Agent</text><text x="242" y="194" class="body">Generate alpha candidates</text><line x1="384.0" y1="194.0" x2="400.0" y2="194.0" stroke="#5c6670" stroke-width="2.2" marker-end="url(#arrow)"/><rect x="404" y="138" width="154" height="112" rx="8" fill="#fff4df" stroke="#c47f17" stroke-width="2"/><text x="420" y="168" class="label">Harness</text><text x="420" y="194" class="body">Gate legality, similarity,</text><text x="420" y="212" class="body">self-correlation</text><line x1="562.0" y1="194.0" x2="578.0" y2="194.0" stroke="#5c6670" stroke-width="2.2" marker-end="url(#arrow)"/><rect x="582" y="138" width="154" height="112" rx="8" fill="#eaf1ff" stroke="#2f6fed" stroke-width="2"/><text x="598" y="168" class="label">Memory</text><text x="598" y="194" class="body">Store failures, blockers,</text><text x="598" y="212" class="body">candidate_uid trace</text><line x1="740.0" y1="194.0" x2="756.0" y2="194.0" stroke="#5c6670" stroke-width="2.2" marker-end="url(#arrow)"/><rect x="760" y="138" width="154" height="112" rx="8" fill="#e8f6ee" stroke="#1f9d55" stroke-width="2"/><text x="776" y="168" class="label">Profile</text><text x="776" y="194" class="body">Evolve next search biases</text><line x1="918.0" y1="194.0" x2="934.0" y2="194.0" stroke="#5c6670" stroke-width="2.2" marker-end="url(#arrow)"/><rect x="938" y="138" width="154" height="112" rx="8" fill="#fdecec" stroke="#d64545" stroke-width="2"/><text x="954" y="168" class="label">Review</text><text x="954" y="194" class="body">Explicit human submit boundary</text><rect x="80" y="318" width="206" height="104" rx="8" fill="#f7f9fb" stroke="#d8dde3"/><text x="96" y="346" class="body">Harness score</text><text x="96" y="379" class="metric" fill="#1f9d55">0.885</text><text x="96" y="402" class="tiny">workflow quality, not tradi...</text><rect x="318" y="318" width="206" height="104" rx="8" fill="#f7f9fb" stroke="#d8dde3"/><text x="334" y="346" class="body">Candidate funnel</text><text x="334" y="379" class="metric" fill="#2f6fed">5 -&gt; 1 ready</text><text x="334" y="402" class="tiny">generated to ready candidates</text><rect x="556" y="318" width="206" height="104" rx="8" fill="#f7f9fb" stroke="#d8dde3"/><text x="572" y="346" class="body">Self-correlation</text><text x="572" y="379" class="metric" fill="#c47f17">1 blocked</text><text x="572" y="402" class="tiny">main pressure signal</text><rect x="794" y="318" width="206" height="104" rx="8" fill="#f7f9fb" stroke="#d8dde3"/><text x="810" y="346" class="body">Submit guard</text><text x="810" y="379" class="metric" fill="#d64545">no real submit</text><text x="810" y="402" class="tiny">public demo records review ...</text><text x="48" y="486" class="tiny">What this proves: worldquant-harness is a reproducible research harness loop, not a one-shot alpha script.</text></svg>
