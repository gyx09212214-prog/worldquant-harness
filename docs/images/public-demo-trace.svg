<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
<title id="title">worldquant-harness public demo trace funnel</title>
<desc id="desc">Static worldquant-harness public harness visual.</desc>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#5c6670"/>
  </marker>
  <style>
    text { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #17202a; letter-spacing: 0; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 15px; fill: #5c6670; }
    .label { font-size: 15px; font-weight: 700; }
    .body { font-size: 13px; fill: #5c6670; }
    .tiny { font-size: 12px; fill: #5c6670; }
    .metric { font-size: 20px; font-weight: 700; }
  </style>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="48" y="54" class="title">Public demo trace: candidate_uid lifecycle funnel</text><text x="48" y="82" class="subtitle">Each candidate keeps a stable candidate_uid from creation through simulation, review, rejection, ready state, and explicit submit boundaries.</text><text x="60" y="154" class="label">Candidates</text><rect x="190" y="132" width="760" height="34" rx="8" fill="#eef1f4"/><rect x="190" y="132" width="720.0" height="34" rx="8" fill="#2f6fed"/><text x="970" y="155" class="metric">5</text><text x="60" y="208" class="label">Simulated</text><rect x="190" y="186" width="760" height="34" rx="8" fill="#eef1f4"/><rect x="190" y="186" width="432.0" height="34" rx="8" fill="#2f6fed"/><text x="970" y="209" class="metric">3</text><text x="60" y="262" class="label">Reviewed</text><rect x="190" y="240" width="760" height="34" rx="8" fill="#eef1f4"/><rect x="190" y="240" width="432.0" height="34" rx="8" fill="#c47f17"/><text x="970" y="263" class="metric">3</text><text x="60" y="316" class="label">Ready</text><rect x="190" y="294" width="760" height="34" rx="8" fill="#eef1f4"/><rect x="190" y="294" width="144.0" height="34" rx="8" fill="#1f9d55"/><text x="970" y="317" class="metric">1</text><text x="60" y="370" class="label">Rejected</text><rect x="190" y="348" width="760" height="34" rx="8" fill="#eef1f4"/><rect x="190" y="348" width="288.0" height="34" rx="8" fill="#d64545"/><text x="970" y="371" class="metric">2</text><text x="60" y="424" class="label">Submitted</text><rect x="190" y="402" width="760" height="34" rx="8" fill="#eef1f4"/><rect x="190" y="402" width="4.0" height="34" rx="8" fill="#5c6670"/><text x="970" y="425" class="metric">0</text><text x="60" y="478" class="label">Active</text><rect x="190" y="456" width="760" height="34" rx="8" fill="#eef1f4"/><rect x="190" y="456" width="4.0" height="34" rx="8" fill="#5c6670"/><text x="970" y="479" class="metric">0</text><rect x="60" y="470" width="1000" height="48" rx="8" fill="#f7f9fb" stroke="#d8dde3"/><text x="76" y="492" class="label">Reject reasons</text><text x="76" y="512" class="tiny">exact_active_duplicate: 1, illegal_field: 1, not_confirmed_ready: 1, self_correlation_value_above_strict_cutoff: 1</text><text x="48" y="536" class="tiny">What this proves: the harness turns agent output into an auditable lifecycle, with no hidden submit step.</text></svg>
